---
version: "3.8"

services:
  beets:
    image: lscr.io/linuxserver/beets
    container_name: beets
    environment:
      - PUID=1000
      - PGID=1041
      - TZ=America/New_York
    volumes:
      - /storage/beets/config:/config
      - /storage/media/music:/music
      - /storage/downloads:/downloads
    ports:
      - 8337:8337
    restart: unless-stopped
